name: Teachers Mutual Bank
kind: company
description: Teachers Mutual Bank is an Australian customer-owned mutual bank and a
  brand of Teachers Mutual Bank Limited (TMBL), an authorised deposit-taking institution
  (ADI) regulated by APRA that also operates UniBank, Firefighters Mutual Bank, Health
  Professionals Bank and Hiver. As a member-owned bank it returns value to members
  rather than external shareholders and serves teachers, education staff and the wider
  community. Under Australia's Consumer Data Right (CDR / Open Banking), Teachers Mutual
  Bank exposes a public, unauthenticated Product Reference Data (PRD) API conforming
  to the Data Standards Body (DSB) Consumer Data Standards, letting anyone retrieve
  its banking product catalogue. Consumer (account and transaction) data sharing is
  available to accredited data recipients through the authenticated CDR channel using
  the OAuth2 / OpenID Connect FAPI security profile.
