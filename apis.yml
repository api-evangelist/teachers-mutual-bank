  - url: openapi/teachers-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right payees surface for Teachers
    Mutual Bank, defined by the DSB Consumer Data Standards CDR Banking API (v1.36.0).
    Covers Get Payees (GET /banking/payees) and Get Payee Detail (GET /banking/payees/{payeeId}),
    returning a consumer's saved payees where they have authorized sharing. Access
    requires a consumer to authorize an accredited data recipient (ADR) through the
    CDR OAuth2 / OpenID Connect FAPI security profile over MTLS; these endpoints are
    not publicly callable without accreditation and explicit consumer consent.
