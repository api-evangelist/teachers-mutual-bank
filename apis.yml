  baseURL: https://ob.tmbl.com.au/tmbank/cds-au/v1/banking/accounts
  properties:
  - url: https://www.tmbank.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/teachers-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right transactions surface for
    Teachers Mutual Bank, defined by the DSB Consumer Data Standards CDR Banking
    API (v1.36.0). Covers Get Transactions For Account (GET /banking/accounts/{accountId}/transactions)
    and Get Transaction Detail (GET /banking/accounts/{accountId}/transactions/{transactionId}),
    supporting date, amount and text filtering per the standard. Access requires a
    consumer to authorize an accredited data recipient (ADR) through the CDR OAuth2
    / OpenID Connect FAPI security profile over MTLS; the endpoints are not publicly
    callable without accreditation and consumer consent.
