  - url: openapi/teachers-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right direct-debits and scheduled-payments
    surface for Teachers Mutual Bank, defined by the DSB Consumer Data Standards CDR
    Banking API (v1.36.0). Covers Get Direct Debits For Account and Get Bulk Direct
    Debits (GET /banking/accounts/{accountId}/direct-debits, GET /banking/accounts/direct-debits),
    plus Get Scheduled Payments For Account and Get Bulk Scheduled Payments (GET
    /banking/accounts/{accountId}/payments/scheduled, GET /banking/payments/scheduled).
    Access requires a consumer to authorize an accredited data recipient (ADR) via
    the CDR OAuth2 / OpenID Connect FAPI flow over MTLS; not publicly callable.
