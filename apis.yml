- aid: teachers-mutual-bank:teachers-mutual-bank-cdr-product-reference-data-api
  name: Teachers Mutual Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Consumer Data Right
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.tmbank.com.au/open-banking
  baseURL: https://ob.tmbl.com.au/tmbank/cds-au/v1/banking/products
  properties:
  - url: https://www.tmbank.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/teachers-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API for the Teachers Mutual Bank brand of Teachers Mutual Bank Limited. Exposes
    GET /banking/products and GET /banking/products/{productId} under the standard
    CDS base path, returning the bank's full banking product catalogue (30 products
    at time of review) as defined by the DSB Consumer Data Standards. Confirmed live
    (HTTP 200) on 2026-07-21 with the x-v request header set to 4 (version 3 now
    returns HTTP 406; the server advertises current version 4). No authentication,
    MTLS or ADR accreditation is required for these product endpoints.
- aid: teachers-mutual-bank:teachers-mutual-bank-cdr-accounts-balances-api
  name: Teachers Mutual Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Consumer Data Right
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.tmbank.com.au/open-banking
  baseURL: https://ob.tmbl.com.au/tmbank/cds-au/v1/banking/accounts
  properties:
  - url: https://www.tmbank.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/teachers-mutual-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right accounts and balances surface
    for Teachers Mutual Bank, defined by the DSB Consumer Data Standards CDR Banking
    API (v1.36.0). Covers Get Accounts (GET /banking/accounts), Get Account Detail
    (GET /banking/accounts/{accountId}), Get Bulk Balances (GET /banking/accounts/balances),
    and Get Account Balance (GET /banking/accounts/{accountId}/balance). These
    endpoints are NOT public and access requires a consumer to authorize an accredited
    data recipient (ADR) via the CDR OAuth2 / OpenID Connect FAPI flow over MTLS,
    so unauthenticated calls are rejected (HTTP 404/401 at the data-holder gateway).
